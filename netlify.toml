[build]
  command = "npm run build"
  publish = "out"
  functions = "netlify/functions"

# Export statique Next (`output: "export"`). Le dossier `out/` est publié tel quel.
# Les Netlify Functions sont compilées séparément (pas par Next.js).
# G12 — Brotli compression : activé automatiquement par Netlify sur tous les assets texte.
# G11 — Cache-Control par type d'asset.

[build.processing]
  skip_processing = false

# Apex canonique — www → non-www
[[redirects]]
  from = "https://www.automatex-hub.com/*"
  to = "https://automatex-hub.com/:splat"
  status = 301
  force = true

# Assets immuables avec hash (JS/CSS/polices Next.js) : cache 1 an
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pages HTML / routes app — revalidation immédiate (priorité moindre que assets hashés)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Assets statiques /public/assets : cache long (noms stables)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fonts Next.js (self-hosted via next/font)
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SVG hors /assets (favicon, etc.)
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Pages HTML : pas de cache long (contenu peut changer)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Sitemap / robots : 1 jour
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Manifest PWA
[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/manifest+json"

# favicon.ico — vrai ICO (build brand:favicons)
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
    Content-Type = "image/x-icon"

[[headers]]
  for = "/icon.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
    Content-Type = "image/png"

[[headers]]
  for = "/apple-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
    Content-Type = "image/png"

# J7 / G15 — Headers de sécurité globaux (RGAA + Lighthouse Best Practices)
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' https://plausible.io https://www.googletagmanager.com https://www.google-analytics.com https://scripts.clarity.ms https://www.clarity.ms; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://plausible.io https://www.google-analytics.com https://region1.google-analytics.com https://www.clarity.ms https://ingesteer.services-prod.nsvcs.net; frame-ancestors 'none'; form-action 'self'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
